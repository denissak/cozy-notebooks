name: Backend CI

# Production-style CI for the Spring Boot backend.
#
# Job 1 (test):
#   A real MySQL 8.4 container runs as a GitHub Actions service on
#   localhost:3306, and the test JVM uses USE_LOCAL_MYSQL=true so
#   AbstractIntegrationTest skips Testcontainers entirely and connects to
#   that service directly. Mirrors the local IntelliJ run configuration.
#
# Job 2 (docker-build):
#   Runs only after tests pass. Builds the Docker image to verify the
#   Dockerfile works end-to-end. The image is NOT pushed to any registry
#   and NOT deployed anywhere — this workflow is build/test only.

on:
  push:
    branches: [ main, qa ]
  pull_request:
    branches: [ main, qa ]

permissions:
  contents: read

jobs:
  test:
    name: Build & test (MySQL service)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: cozy_notebooks
          MYSQL_USER: cozy
          MYSQL_PASSWORD: cozy
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ucozy -pcozy"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=30

    env:
      USE_LOCAL_MYSQL: "true"
      TESTCONTAINERS_RYUK_DISABLED: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -ucozy -pcozy --silent; then
              echo "MySQL is up."
              exit 0
            fi
            echo "Waiting for MySQL... ($i)"
            sleep 2
          done
          echo "MySQL did not become ready in time."
          exit 1

      - name: Run tests
        run: ./gradlew --no-daemon clean test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            build/reports/tests/test
            build/test-results/test
          if-no-files-found: ignore

  docker-build:
    name: Build Docker image (no push)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: false
          tags: |
            cozy-notebooks-backend:ci
            cozy-notebooks-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
