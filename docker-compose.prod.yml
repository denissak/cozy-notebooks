# Production compose stack (self-hosted MySQL + backend).
#
# For managed-database deployments (HeatWave / Cloud SQL / RDS / ...) skip
# the mysql service entirely and just run the backend image with DB_URL,
# DB_USERNAME, DB_PASSWORD pointed at your managed instance.
#
# Usage:
#   1. cp .env.example .env  # fill in real values
#   2. docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# Variables read from .env (Docker Compose interpolation at parse time):
#   SPRING_PROFILES_ACTIVE  must be 'prod'
#   PORT                    backend listen port (default 8080)
#   DB_URL                  full JDBC URL the backend uses
#   DB_USERNAME             DB user (also used by the bundled mysql service)
#   DB_PASSWORD             DB password (also used by the bundled mysql service)

services:
  mysql:
    image: mysql:8.4
    container_name: cozy-mysql-prod
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+00:00
    environment:
      MYSQL_DATABASE: cozy_notebooks
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - cozy_mysqldata:/var/lib/mysql
    networks:
      - cozy-net
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-u${DB_USERNAME}",
          "-p${DB_PASSWORD}",
        ]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    image: ghcr.io/YOUR_USER/cozy-notebooks-backend:latest
    container_name: cozy-notebooks-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      PORT: ${PORT:-8080}
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    networks:
      - cozy-net

volumes:
  cozy_mysqldata:

networks:
  cozy-net:
    driver: bridge
