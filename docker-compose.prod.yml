# Production compose stack.
#
# Usage:
#   1. Copy .env.example to .env and fill in real secrets.
#   2. (Optional) Replace the backend image tag with your published image.
#   3. docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# Variables consumed from .env (Docker Compose interpolation at parse time):
#   MYSQL_PASSWORD       password for the application DB user
#   MYSQL_ROOT_PASSWORD  password for the MySQL root user
#   DB_USERNAME          application DB user (e.g. cozy)
#   SPRING_PROFILES_ACTIVE  must be 'prod'

services:
  mysql:
    image: mysql:8.4
    container_name: cozy-mysql-prod
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+00:00
    environment:
      MYSQL_DATABASE: cozy_notebooks
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - cozy_mysqldata:/var/lib/mysql
    networks:
      - cozy-net
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-u${DB_USERNAME}",
          "-p${MYSQL_PASSWORD}",
        ]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    image: ghcr.io/YOUR_USER/cozy-notebooks-backend:latest
    container_name: cozy-notebooks-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_URL: "jdbc:mysql://mysql:3306/cozy_notebooks?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    networks:
      - cozy-net

volumes:
  cozy_mysqldata:

networks:
  cozy-net:
    driver: bridge
