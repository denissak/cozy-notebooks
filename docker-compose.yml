services:
  mysql:
    image: mysql:8.4
    container_name: cozy-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+00:00
    environment:
      MYSQL_DATABASE: cozy_notebooks
      MYSQL_USER: cozy
      MYSQL_PASSWORD: cozy
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - cozy_mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ucozy", "-pcozy"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cozy-notebooks
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/cozy_notebooks?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: cozy
      SPRING_DATASOURCE_PASSWORD: cozy
      SERVER_PORT: 8080
      COZY_MOCK_USER_ENABLED: "true"
    ports:
      - "8080:8080"

volumes:
  cozy_mysqldata:
