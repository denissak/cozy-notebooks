spring:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect
        timezone.default_storage: NORMALIZE_UTC
        type.preferred_uuid_jdbc_type: CHAR

cozy:
  cors:
    # Include production-like Vercel origin for CORS regression tests.
    allowed-origins: https://cozy-notebooks.vercel.app,http://localhost:5173,http://localhost:3000

  auth:
    jwt-secret: ${COZY_AUTH_JWT_SECRET:test-jwt-secret-change-me-not-for-production-use}
    access-token-ttl-minutes: ${COZY_AUTH_ACCESS_TOKEN_TTL_MINUTES:60}
    refresh-token-ttl-days: ${COZY_AUTH_REFRESH_TOKEN_TTL_DAYS:30}
    google-enabled: true
    google-client-id: ${COZY_AUTH_GOOGLE_CLIENT_ID:test.apps.googleusercontent.com}

  security:
    mock-user-enabled: true
    mock-user-id: 00000000-0000-0000-0000-000000000001
    mock-user-email: test@cozy.local

logging:
  level:
    root: WARN
    com.cozy: INFO
