spring:
  application:
    name: cozy-notebooks

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/cozy_notebooks?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:cozy}
    password: ${SPRING_DATASOURCE_PASSWORD:cozy}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    open-in-view: false
    hibernate:
      # Schema is owned by Flyway. Hibernate must not auto-create or validate
      # the schema, which would conflict with the MySQL-specific column
      # definitions (TEXT, TINYINT(1), TIMESTAMP(6), JSON).
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        jdbc.lob.non_contextual_creation: true
        dialect: org.hibernate.dialect.MySQLDialect
        # Store all OffsetDateTime fields as UTC TIMESTAMP(6) (no offset column).
        timezone.default_storage: NORMALIZE_UTC
        # Map java.util.UUID to CHAR(36) (matches the Flyway schema). Without
        # this, Hibernate 6's default is BINARY(16) which breaks INSERTs into
        # CHAR(36) id columns ("Incorrect string value" on MySQL).
        type.preferred_uuid_jdbc_type: CHAR

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

cozy:
  cors:
    # Comma-separated browser origins (never use "*"). Override per env, e.g. Render QA:
    # COZY_CORS_ALLOWED_ORIGINS=https://cozy-notebooks.vercel.app,http://localhost:5173
    allowed-origins: ${COZY_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

  auth:
    jwt-secret: ${COZY_AUTH_JWT_SECRET:dev-only-change-me}
    access-token-ttl-minutes: ${COZY_AUTH_ACCESS_TOKEN_TTL_MINUTES:15}
    refresh-token-ttl-days: ${COZY_AUTH_REFRESH_TOKEN_TTL_DAYS:30}
    google-enabled: ${COZY_AUTH_GOOGLE_ENABLED:true}
    google-client-id: ${COZY_AUTH_GOOGLE_CLIENT_ID:}

  security:
    # MVP: when true, request is bound to a fixed dev user. Replace with JWT later.
    mock-user-enabled: ${COZY_MOCK_USER_ENABLED:true}
    mock-user-id: ${COZY_MOCK_USER_ID:00000000-0000-0000-0000-000000000001}
    mock-user-email: ${COZY_MOCK_USER_EMAIL:dev@cozy.local}

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
